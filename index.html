<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Agrippa Industries is a growing maritime logistics company dedicated to serving a variety of partners. Designed to deliver, forged in America.">
    <title>Agrippa Industries</title>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="assets/icons/favicon.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/agrippa-marine-32.png">
    <link rel="icon" type="image/png" sizes="192x192" href="assets/icons/agrippa-marine.png">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/icons/agrippa-marine.png">
    <link rel="icon" type="image/x-icon" href="assets/icons/favicon.ico">

    <!-- Brand Styles -->
    <link rel="stylesheet" href="assets/agrippa.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            background-color: var(--agrippa-indigo-blue);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: auto 0;
        }

        .logo {
            width: min(240px, 55vw);
            height: auto;
            margin-bottom: 2rem;
        }

        /* Landscape mode: constrain logo by viewport height to fit content above fold */
        @media (orientation: landscape) and (max-height: 500px) {
            .logo {
                max-height: 22vh;
                width: auto;
                margin-bottom: 1rem;
            }
        }

        .wordmark {
            font-family: var(--font-sans);
            font-weight: 700;
            font-size: clamp(2.25rem, 5vw, 3.25rem);
            color: var(--agrippa-salt-spray-white);
            text-align: center;
            margin-bottom: 1rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .slogan {
            font-family: var(--font-sans);
            font-weight: 500;
            font-size: clamp(1.2rem, 2.8vw, 1.6rem);
            color: var(--agrippa-salt-spray-white);
            text-align: center;
            max-width: 600px;
            line-height: 1.4;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .tagline {
            font-family: var(--font-sans);
            font-weight: 400;
            font-size: 1rem;
            color: var(--agrippa-salt-spray-white);
            text-align: center;
            margin-bottom: 1.5rem;
            max-width: 700px;
            line-height: 1.5;
        }

        .footer {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            width: 100%;
            font-family: var(--font-sans);
            font-size: 0.875rem;
            color: var(--agrippa-dove-grey);
        }

        .footer .copyright {
            padding: 0.5rem 0.5rem;
        }

        .footer-nav {
            display: flex;
            align-items: center;
        }

        .footer a {
            color: var(--agrippa-salt-spray-white);
            font-weight: 500;
            text-decoration: none;
            padding: 0.875rem 0.5rem;
            transition: color 0.2s ease;
        }

        .footer a:hover,
        .footer a:focus {
            color: white;
            outline: none;
        }

        .footer a:focus-visible {
            text-decoration: underline;
            text-decoration-thickness: 2px;
            text-underline-offset: 4px;
        }

        .footer .divider {
            padding: 0 0.125rem;
            user-select: none;
        }

        /* Mobile optimization */
        @media (max-width: 640px) {
            body {
                padding: 1.25rem;
            }

            .logo {
                margin-bottom: 1.25rem;
            }

            .wordmark {
                margin-bottom: 0.75rem;
            }

            .tagline {
                margin-bottom: 1rem;
            }

            .footer {
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <main>
        <div class="hero">
            <img
                src="assets/icons/agrippa-white.svg"
                alt="Agrippa Industries Logo - two white segments meeting at an angle, forming a stylized letter A "
                class="logo"
            >

            <h1 class="wordmark">Agrippa Industries</h1>

            <p class="slogan">Designed to Deliver &middot; Forged in America</p>
        </div>

        <p class="tagline">Agrippa Industries is a growing maritime logistics company dedicated to serving a variety of partners.</p>
    </main>

    <footer class="footer">
        <span class="copyright">&copy; 2026 Agrippa Industries Inc.</span>
        <span class="divider" aria-hidden="true">&middot;</span>
        <nav class="footer-nav" aria-label="Contact">
            <a href="mailto:careers@agrippaindustries.com">Join Us</a>
            <span class="divider" aria-hidden="true">&middot;</span>
            <a href="mailto:info@agrippaindustries.com">Contact</a>
        </nav>
    </footer>
</body>
</html>
