<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Agrippa Industries - A New Maritime Legacy, Forged in America">
    <title>Agrippa Industries | A New Maritime Legacy</title>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="assets/icons/favicon.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/agrippa-marine-32.png">
    <link rel="icon" type="image/png" sizes="192x192" href="assets/icons/agrippa-marine.png">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/icons/agrippa-marine.png">
    <link rel="icon" type="image/x-icon" href="assets/icons/favicon.ico">

    <!-- Brand Styles -->
    <link rel="stylesheet" href="assets/agrippa.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            background-color: var(--agrippa-indigo-blue);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        main {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .logo {
            width: min(240px, 55vw);
            height: auto;
            margin-bottom: 2rem;
        }

        .wordmark {
            font-family: var(--font-sans);
            font-weight: 700;
            font-size: clamp(2.25rem, 5vw, 3.25rem);
            color: var(--agrippa-salt-spray-white);
            text-align: center;
            margin-bottom: 1rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .tagline {
            font-family: var(--font-sans);
            font-weight: 500;
            font-size: clamp(1.1rem, 2.5vw, 1.35rem);
            color: var(--agrippa-dove-grey);
            text-align: center;
            margin-bottom: 2.75rem;
            max-width: 700px;
            line-height: 1.5;
        }

        .links {
            display: flex;
            gap: 0;
            align-items: center;
            justify-content: center;
            margin-bottom: 4rem;
        }

        .links a {
            font-family: var(--font-sans);
            font-weight: 500;
            font-size: 1rem;
            color: var(--agrippa-salt-spray-white);
            text-decoration: none;
            padding: 0.5rem 1.5rem;
            transition: color 0.2s ease;
            position: relative;
        }

        .links a:hover,
        .links a:focus {
            color: white;
            outline: none;
        }

        .links a:focus-visible {
            text-decoration: underline;
            text-decoration-thickness: 2px;
            text-underline-offset: 4px;
        }

        .links .divider {
            color: var(--agrippa-dove-grey);
            padding: 0 0.5rem;
            user-select: none;
        }

        .footer {
            font-family: var(--font-sans);
            font-size: 0.75rem;
            color: var(--agrippa-dove-grey);
            text-align: center;
            opacity: 0.7;
        }

        /* Mobile optimization */
        @media (max-width: 640px) {
            body {
                padding: 1.5rem;
            }

            .logo {
                margin-bottom: 1.5rem;
            }

            .wordmark {
                margin-bottom: 0.75rem;
            }

            .tagline {
                margin-bottom: 2rem;
            }

            .links {
                margin-bottom: 3rem;
            }

            .links .divider {
                padding: 0 0.75rem;
            }

            .footer {
                font-size: 0.7rem;
            }
        }
    </style>
</head>
<body>
    <main>
        <img
            src="assets/icons/agrippa-white.svg"
            alt="Agrippa Industries Logo"
            class="logo"
        >

        <h1 class="wordmark">Agrippa Industries</h1>

        <p class="tagline">A New Maritime Legacy, Forged in America</p>

        <nav class="links" aria-label="Contact">
            <a href="mailto:careers@agrippaindustries.com">Join Us</a>
            <span class="divider">|</span>
            <a href="mailto:info@agrippaindustries.com">Contact</a>
        </nav>
    </main>

    <footer class="footer">
        &copy; 2026 Agrippa Industries
    </footer>
</body>
</html>
